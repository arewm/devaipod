<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devaipod - Agent</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #e6e6e6;
            --text-secondary: #a0a0a0;
            --accent: #e94560;
            --success: #4ade80;
            --warning: #fbbf24;
            --border: #2a2a4a;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .header {
            height: 40px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            gap: 1rem;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .back-link {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .back-link:hover {
            color: var(--accent);
        }
        
        .back-arrow {
            font-size: 1rem;
        }
        
        .logo {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .separator {
            color: var(--border);
        }
        
        .pod-name {
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        
        .agent-frame {
            position: fixed;
            top: 40px;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: calc(100vh - 40px);
            border: none;
        }
        
        .error {
            padding: 2rem;
            text-align: center;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="#" class="back-link" id="back-link"><span class="back-arrow">←</span> Back</a>
            <span class="separator">|</span>
            <span class="logo">devaipod</span>
            <span class="separator">/</span>
            <span class="pod-name" id="pod-name"></span>
        </div>
    </div>
    
    <iframe id="agent-frame" class="agent-frame"></iframe>
    <div id="error" class="error" style="display: none;"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const podName = params.get('pod');
        const agentUrl = params.get('url');
        const consoleUrl = params.get('console');
        
        // Set pod name in header
        document.getElementById('pod-name').textContent = podName || 'Unknown Pod';
        
        // Set back link
        const backLink = document.getElementById('back-link');
        if (consoleUrl) {
            backLink.href = decodeURIComponent(consoleUrl);
        } else {
            backLink.style.display = 'none';
        }
        
        // Load agent iframe
        const frame = document.getElementById('agent-frame');
        const errorDiv = document.getElementById('error');
        
        if (agentUrl) {
            frame.src = decodeURIComponent(agentUrl);
        } else {
            frame.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'No agent URL provided. Missing "url" query parameter.';
        }
    </script>
</body>
</html>
