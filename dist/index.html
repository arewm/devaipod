<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devaipod - Control Plane</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- xterm.js: vendored at container build time (see Containerfile) -->
    <link rel="stylesheet" href="vendor/xterm/xterm.css">
    <script src="vendor/xterm/xterm.js"></script>
    <script src="vendor/xterm/addon-fit.js"></script>
    <style>
        :root {
            --bg-primary: #131010;
            --bg-secondary: #1c1717;
            --bg-card: #1c1717;
            --text-primary: #f1ecec;
            --text-secondary: #b7b1b1;
            --text-weak: #716c6b;
            --accent: #89b5ff;
            --success: #00bd00;
            --warning: #ffdc17;
            --error: #ef442a;
            --border: rgba(255,255,255,0.12);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1rem;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
        }
        
        .status-indicator.disconnected {
            background: var(--error);
        }
        
        .pods-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .pod-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            transition: border-color 0.2s;
        }
        
        .pod-card:hover {
            border-color: var(--accent);
        }
        
        .pod-card:focus-visible {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent);
            outline: none;
        }
        
        .pod-card:focus:not(:focus-visible) {
            outline: none;
        }
        
        .pod-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        
        .pod-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .pod-status {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        
        .pod-status.running {
            background: rgba(0, 189, 0, 0.2);
            color: var(--success);
        }
        
        .pod-status.stopped {
            background: rgba(239, 68, 42, 0.2);
            color: var(--error);
        }
        
        .pod-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .pod-meta-item {
            margin-bottom: 0.25rem;
        }
        
        .pod-meta-label {
            color: var(--text-secondary);
        }
        
        .pod-meta-value {
            color: var(--text-primary);
        }
        
        code {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            font-size: 0.9em;
        }
        
        .pod-containers {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }
        
        .container-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0;
            font-size: 0.85rem;
        }
        
        .container-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .container-status.running {
            background: var(--success);
        }
        
        .container-status.stopped {
            background: var(--error);
        }
        
        .container-name {
            color: var(--text-secondary);
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
        
        .error {
            background: rgba(239, 68, 42, 0.2);
            color: var(--error);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .refresh-btn {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
        }
        
        .refresh-btn:hover {
            border-color: var(--accent);
        }
        .refresh-btn:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--accent);
        }
        
        .pod-actions {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }
        
        .open-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
        }
        
        .open-btn:hover {
            opacity: 0.9;
        }
        
        .open-btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
        }
        
        .action-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }
        .action-btn:hover:not(:disabled) {
            border-color: var(--accent);
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .action-btn.danger {
            border-color: var(--error);
            color: var(--error);
        }
        .action-btn.danger:hover:not(:disabled) {
            background: rgba(239, 68, 42, 0.15);
        }
        
        /* Launch form styles */
        .launch-section {
            margin-bottom: 1.5rem;
        }
        
        .launch-toggle-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .launch-toggle-btn:hover {
            opacity: 0.9;
        }
        
        .launch-toggle-btn .shortcut {
            font-size: 0.75rem;
            opacity: 0.7;
            background: rgba(255, 255, 255, 0.15);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
        }
        
        .launch-form {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
        }
        
        .launch-form.expanded {
            display: block;
        }
        
        .launch-form-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }
        
        .form-input {
            width: 100%;
            background: #151313;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.65rem 0.85rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent);
        }
        
        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        
        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }
        
        .launch-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.65rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .launch-btn:hover:not(:disabled) {
            opacity: 0.9;
        }
        
        .launch-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .cancel-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 0.65rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        .cancel-btn:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }
        
        .form-error {
            background: rgba(239, 68, 42, 0.2);
            color: var(--error);
            padding: 0.75rem;
            border-radius: 4px;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .form-advanced-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            padding: 0.4rem 0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .form-advanced-toggle:hover { color: var(--text-primary); }
        .form-advanced-toggle .arrow { transition: transform 0.2s; display: inline-block; }
        .form-advanced-toggle.open .arrow { transform: rotate(90deg); }
        .form-advanced { display: none; margin-top: 0.75rem; }
        .form-advanced.open { display: block; }

        .form-hint {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            opacity: 0.7;
        }

        .scope-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .scope-row { display: flex; gap: 0.5rem; align-items: center; }
        .scope-row input { flex: 1; }
        .scope-remove-btn, .scope-add-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.4rem 0.7rem;
        }
        .scope-remove-btn:hover { border-color: var(--error); color: var(--error); }
        .scope-add-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .form-checkbox input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }
        .form-checkbox label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .pod-card.advisor-pod {
            border-color: #7c3aed;
        }
        .advisor-proposals-inline {
            margin-top: 0.5rem;
            border-top: 1px solid var(--border);
            padding-top: 0.5rem;
        }
        .advisor-proposals-inline:empty {
            display: none;
        }
        .advisor-launch-prompt .pod-meta-item {
            color: var(--text-secondary);
            font-style: italic;
        }

        .proposals-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: #ccc;
            font-size: 0.9rem;
        }
        .proposal-card {
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }
        .proposal-card .proposal-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .proposal-card .proposal-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        .proposal-card .proposal-rationale {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .proposal-card .proposal-actions {
            display: flex;
            gap: 0.5rem;
        }
        .proposal-priority {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.4rem;
        }
        .proposal-priority.high { background: rgba(239, 68, 42, 0.2); color: #ef442a; }
        .proposal-priority.medium { background: rgba(255, 220, 23, 0.15); color: #ffdc17; }
        .proposal-priority.low { background: rgba(137, 181, 255, 0.15); color: #89b5ff; }
        .dismiss-btn {
            padding: 0.2rem 0.5rem;
            background: transparent;
            color: var(--text-weak);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
        }
        .dismiss-btn:hover { color: var(--error); border-color: var(--error); }

        .pod-card.collapsed .pod-meta,
        .pod-card.collapsed .pod-containers,
        .pod-card.collapsed .pod-actions,
        .pod-card.collapsed .advisor-proposals-inline {
            display: none;
        }
        .pod-header {
            cursor: pointer;
            user-select: none;
        }
        .expand-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.4rem;
            height: 1.4rem;
            margin-left: auto;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-weak);
            font-size: 0.65rem;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
            flex-shrink: 0;
        }
        .expand-toggle:hover {
            background: rgba(255,255,255,0.12);
            color: var(--text-secondary);
        }
        .pod-card.collapsed .expand-toggle {
            transform: rotate(-90deg);
        }

        /* Terminal overlay */
        .terminal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            flex-direction: column;
        }
        .terminal-overlay.active {
            display: flex;
        }
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        .terminal-header .terminal-title {
            font-weight: 600;
        }
        .terminal-close-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }
        .terminal-close-btn:hover {
            border-color: var(--error);
            color: var(--error);
        }
        .terminal-body {
            flex: 1;
            padding: 4px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <header>
        <h1>devaipod</h1>
        <div class="status">
            <span id="connection-status" class="status-indicator"></span>
            <span id="connection-text">Connecting...</span>
            <button class="refresh-btn" onclick="refreshPods({force: true})">Refresh</button>
        </div>
    </header>
    
    <main>
        <!-- Launch form section -->
        <div class="launch-section">
            <button id="launch-toggle" class="launch-toggle-btn" onclick="toggleLaunchForm()">
                + New Workspace <span class="shortcut">n</span>
            </button>
            <div id="launch-form" class="launch-form">
                <div class="launch-form-title">Launch New Workspace</div>
                <form onsubmit="submitLaunchForm(event)">
                    <div class="form-group">
                        <label class="form-label" for="repo-url">Repository URL</label>
                        <input 
                            type="text" 
                            id="repo-url" 
                            class="form-input" 
                            placeholder="https://github.com/org/repo or issue/PR URL"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="task-input">Task (optional)</label>
                        <textarea 
                            id="task-input" 
                            class="form-input form-textarea" 
                            placeholder="Describe what the agent should work on..."
                        ></textarea>
                    </div>

                    <button type="button" class="form-advanced-toggle" onclick="toggleAdvanced(this)">
                        <span class="arrow">&#9654;</span> Advanced options
                    </button>
                    <div id="launch-advanced" class="form-advanced">
                        <div class="form-group">
                            <label class="form-label" for="pod-name">Pod name (optional)</label>
                            <input type="text" id="pod-name" class="form-input" placeholder="Auto-generated from repo name">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="image-override">Container image (optional)</label>
                            <input type="text" id="image-override" class="form-input" placeholder="Use devcontainer.json by default">
                            <div class="form-hint">Override the image built from devcontainer.json</div>
                        </div>

                        <div class="form-group" style="margin-top:1.25rem">
                            <label class="form-label">Service-gator scopes</label>
                            <div class="form-hint" style="margin-bottom:0.5rem">
                                Control AI agent access to external services (e.g. <code>github:org/repo</code>, <code>github:org/*:write</code>)
                            </div>
                            <div id="scope-list" class="scope-list"></div>
                            <button type="button" class="scope-add-btn" onclick="addScopeRow()" style="margin-top:0.5rem">+ Add scope</button>
                        </div>
                        <div class="form-checkbox">
                            <input type="checkbox" id="gator-ro">
                            <label for="gator-ro">Read-only mode (suppress default write scopes)</label>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="gator-image">Service-gator image (optional)</label>
                            <input type="text" id="gator-image" class="form-input" placeholder="Default: ghcr.io/cgwalters/service-gator:latest">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="launch-submit-btn" class="launch-btn">Launch</button>
                        <button type="button" class="cancel-btn" onclick="toggleLaunchForm()">Cancel</button>
                    </div>
                    <div id="launch-error" class="form-error" style="display: none;"></div>
                </form>
            </div>
        </div>

        
        <div id="error-container"></div>
        <div id="pods-container" class="loading">Loading pods...</div>
    </main>

    <div id="terminal-overlay" class="terminal-overlay">
        <div class="terminal-header">
            <span class="terminal-title" id="terminal-title">Terminal</span>
            <button class="terminal-close-btn" onclick="closeTerminal()">Close (Esc)</button>
        </div>
        <div class="terminal-body" id="terminal-container"></div>
    </div>

    <script>
        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        
        if (!token) {
            document.getElementById('pods-container').innerHTML = `
                <div class="error">
                    No authentication token provided. 
                    Use the URL provided by <code>devaipod web</code>.
                </div>
            `;
        }
        
        const authHeader = { 'Authorization': `Bearer ${token}` };

        const collapsedPods = new Set();
        let lastPodFingerprint = '';

        function togglePodCard(headerEl) {
            const card = headerEl.closest('.pod-card');
            const name = card.dataset.podName;
            card.classList.toggle('collapsed');
            if (card.classList.contains('collapsed')) {
                collapsedPods.add(name);
            } else {
                collapsedPods.delete(name);
            }
        }
        
        // API GET helper (on error, use server JSON body error message if present)
        async function apiCall(path) {
            const response = await fetch(`/api${path}`, { headers: authHeader });
            if (!response.ok) {
                let msg = `${response.status} ${response.statusText}`;
                try {
                    const body = await response.json();
                    if (body && typeof body.error === 'string') msg = body.error;
                } catch (_) {}
                throw new Error(msg);
            }
            return response.json();
        }
        
        // API POST (no body) - for start/stop
        async function apiPost(path) {
            const response = await fetch(`/api${path}`, {
                method: 'POST',
                headers: authHeader
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || `${response.status} ${response.statusText}`);
            }
        }
        
        // API DELETE - for pod remove
        async function apiDelete(path) {
            const response = await fetch(`/api${path}`, {
                method: 'DELETE',
                headers: authHeader
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || `${response.status} ${response.statusText}`);
            }
        }
        
        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString();
        }
        
        const PODMAN_PODS = '/podman/v5.0.0/libpod/pods';
        
        async function podDelete(fullName, shortName) {
            if (!confirm(`Delete workspace "${shortName}"? This cannot be undone.`)) return;
            try {
                await apiDelete(`${PODMAN_PODS}/${encodeURIComponent(fullName)}?force=true`);
                await refreshPods({force: true});
            } catch (err) {
                alert(`Delete failed: ${err.message}`);
            }
        }
        
        // Handle pod action buttons via delegation (so Start/Stop/Delete work reliably)
        document.getElementById('pods-container').addEventListener('click', async (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            e.preventDefault();
            e.stopPropagation();
            const action = btn.getAttribute('data-action');
            const fullName = btn.getAttribute('data-pod-full');
            const shortName = btn.getAttribute('data-pod-short');
            if (action === 'open-agent' && shortName) {
                openAgent(shortName);
                return;
            }
            if (action === 'terminal' && shortName) {
                openTerminal(shortName);
                return;
            }
            if (action === 'recreate' && shortName) {
                recreatePod(shortName);
                return;
            }
            if (action === 'start' && fullName) {
                try {
                    await apiPost(`${PODMAN_PODS}/${encodeURIComponent(fullName)}/start`);
                    await refreshPods({force: true});
                } catch (err) {
                    alert(`Start failed: ${err.message}`);
                }
                return;
            }
            if (action === 'stop' && fullName) {
                try {
                    await apiPost(`${PODMAN_PODS}/${encodeURIComponent(fullName)}/stop`);
                    await refreshPods({force: true});
                } catch (err) {
                    alert(`Stop failed: ${err.message}`);
                }
                return;
            }
            if (action === 'delete' && fullName && shortName) {
                await podDelete(fullName, shortName);
                return;
            }
        });
        
        // Open agent for a pod - navigate to agent view (opencode UI)
        async function openAgent(shortName) {
            try {
                const path = `/devaipod/pods/${encodeURIComponent(shortName)}/opencode-info`;
                const info = await apiCall(path);
                sessionStorage.setItem('devaipod_token', token);
                // If we have a latest session, deep-link directly to it via hash
                // so the wrapper can navigate the iframe to the right SPA route.
                let hash = '';
                if (info.latest_session) {
                    const dir = btoa(info.latest_session.directory);
                    hash = `#/${dir}/session/${info.latest_session.id}`;
                }
                window.location.href = `/_devaipod/agent/${encodeURIComponent(shortName)}/${hash}`;
            } catch (err) {
                alert(`Open Agent failed: ${err.message}`);
            }
        }
        
        // Recreate a workspace (delete and recreate with same repo)
        async function recreatePod(shortName) {
            if (!confirm(`Recreate workspace "${shortName}"? It will be deleted and recreated with the same repo.`)) return;
            try {
                const path = `/devaipod/pods/${encodeURIComponent(shortName)}/recreate`;
                const response = await fetch(`/api${path}`, {
                    method: 'POST',
                    headers: authHeader
                });
                if (!response.ok) {
                    let msg = `${response.status} ${response.statusText}`;
                    try {
                        const body = await response.json();
                        if (body && typeof body.error === 'string') msg = body.error;
                    } catch (_) {}
                    throw new Error(msg);
                }
                await refreshPods({force: true});
                alert('Workspace recreated successfully.');
            } catch (err) {
                alert(`Recreate failed: ${err.message}`);
            }
        }
        
        // Render a pod card
        function renderPod(pod) {
            const status = pod.Status || 'unknown';
            const statusClass = status.toLowerCase() === 'running' ? 'running' : 'stopped';
            
            // Extract devaipod labels
            const labels = pod.Labels || {};
            const task = labels['io.devaipod.task'] || '';
            const repo = labels['io.devaipod.repo'] || '';
            const mode = labels['io.devaipod.mode'] || '';
            
            // Render containers
            const containers = (pod.Containers || [])
                .filter(c => !c.Names.includes('-infra'))
                .map(c => {
                    const containerStatus = c.Status === 'running' ? 'running' : 'stopped';
                    const shortName = c.Names.replace(pod.Name + '-', '');
                    return `
                        <div class="container-row">
                            <span class="container-status ${containerStatus}"></span>
                            <span class="container-name">${shortName}</span>
                        </div>
                    `;
                }).join('');
            
            const shortName = pod.Name.replace('devaipod-', '');
            const isAdvisor = shortName === 'advisor';
            const isRunning = status.toLowerCase() === 'running';
            const safeFull = pod.Name.replace(/"/g, '&quot;');
            const safeShort = shortName.replace(/"/g, '&quot;');
            let actionsHtml;
            if (isRunning) {
                actionsHtml = '<button type="button" class="open-btn" data-action="open-agent" data-pod-short="' + safeShort + '">Open Agent</button>' +
                    '<button type="button" class="action-btn" data-action="terminal" data-pod-short="' + safeShort + '" title="Open workspace terminal">Terminal</button>' +
                    '<button type="button" class="action-btn" data-action="stop" data-pod-full="' + safeFull + '" title="Stop pod">Stop</button>';
            } else {
                actionsHtml = '<button type="button" class="action-btn" data-action="start" data-pod-full="' + safeFull + '" title="Start pod">Start</button>';
            }
            actionsHtml += '<button type="button" class="action-btn" data-action="recreate" data-pod-short="' + safeShort + '" title="Delete and recreate with same repo">Recreate</button>';
            if (!isRunning) {
                actionsHtml += '<button type="button" class="action-btn danger" data-action="delete" data-pod-full="' + safeFull + '" data-pod-short="' + safeShort + '" title="Delete pod">Delete</button>';
            }

            const proposalsHtml = isAdvisor ? '<div id="advisor-proposals" class="advisor-proposals-inline"></div>' : '';

            return `
                <div class="pod-card ${isAdvisor ? 'advisor-pod' : ''}" tabindex="0" data-pod-name="${shortName}" data-running="${isRunning}">
                    <div class="pod-header" onclick="togglePodCard(this)">
                        <span class="pod-name">${shortName}</span>
                        <span class="expand-toggle">&#9660;</span>
                        <span class="pod-status ${statusClass}">${status}</span>
                    </div>
                    <div class="pod-meta">
                        ${repo ? `<div class="pod-meta-item"><span class="pod-meta-label">Repo:</span> <span class="pod-meta-value">${repo}</span></div>` : ''}
                        ${task ? `<div class="pod-meta-item"><span class="pod-meta-label">Task:</span> <span class="pod-meta-value">${task.substring(0, 100)}${task.length > 100 ? '...' : ''}</span></div>` : ''}
                        ${mode ? `<div class="pod-meta-item"><span class="pod-meta-label">Mode:</span> <span class="pod-meta-value">${mode}</span></div>` : ''}
                        <div class="pod-meta-item"><span class="pod-meta-label">Created:</span> <span class="pod-meta-value">${formatDate(pod.Created)}</span></div>
                    </div>
                    ${containers ? `<div class="pod-containers">${containers}</div>` : ''}
                    <div class="pod-actions">
                        ${actionsHtml}
                    </div>
                    ${proposalsHtml}
                </div>
            `;
        }
        
        // Refresh pods list
        async function refreshPods({force = false} = {}) {
            const container = document.getElementById('pods-container');
            const statusIndicator = document.getElementById('connection-status');
            const statusText = document.getElementById('connection-text');
            
            try {
                // Use the libpod API endpoint
                const pods = await apiCall('/podman/v5.0.0/libpod/pods/json');
                
                statusIndicator.classList.remove('disconnected');
                statusText.textContent = 'Connected';
                
                // Filter to only devaipod pods
                const devaipodPods = pods.filter(p => p.Name && p.Name.startsWith('devaipod-'));
                // Sort by activity: running first, then by Created descending (newest first)
                devaipodPods.sort((a, b) => {
                    // Pin advisor to top
                    const aAdvisor = a.Name === 'devaipod-advisor' ? 1 : 0;
                    const bAdvisor = b.Name === 'devaipod-advisor' ? 1 : 0;
                    if (bAdvisor !== aAdvisor) return bAdvisor - aAdvisor;
                    // Then running pods first
                    const aRunning = (a.Status || '').toLowerCase() === 'running' ? 1 : 0;
                    const bRunning = (b.Status || '').toLowerCase() === 'running' ? 1 : 0;
                    if (bRunning !== aRunning) return bRunning - aRunning;
                    return (b.Created || '').localeCompare(a.Created || '');
                });
                
                // Build a fingerprint of the pod list to detect actual changes.
                // Only re-render the DOM when something changed.
                const fingerprint = JSON.stringify(devaipodPods.map(p => ({
                    n: p.Name, s: p.Status, c: p.Containers?.length
                })));
                if (!force && fingerprint === lastPodFingerprint) {
                    // Data unchanged — skip DOM rebuild, just refresh proposals
                    checkProposals();
                    return;
                }
                lastPodFingerprint = fingerprint;

                // Remember which card was focused before re-render.
                // If focus is outside the pod list (e.g. an input field),
                // don't steal it after re-render.
                const prevFocused = document.activeElement;
                const focusWasInsideContainer = container.contains(prevFocused);
                const prevPodName = prevFocused && prevFocused.classList.contains('pod-card')
                    ? prevFocused.dataset.podName : null;

                if (devaipodPods.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>No devaipod workspaces found.</p>
                            <p style="margin-top: 0.5rem; font-size: 0.85rem;">
                                Create one with: <code>devaipod run https://github.com/org/repo</code>
                            </p>
                        </div>
                    `;
                } else {
                    const hasAdvisor = devaipodPods.some(p => p.Name === 'devaipod-advisor');
                    container.className = 'pods-list';
                    let html = '';
                    if (!hasAdvisor) {
                        html += `
                            <div class="pod-card advisor-pod advisor-launch-prompt" tabindex="0" data-pod-name="advisor" data-running="false">
                                <div class="pod-header">
                                    <span class="pod-name">advisor</span>
                                    <span class="pod-status stopped">not running</span>
                                </div>
                                <div class="pod-meta">
                                    <div class="pod-meta-item">The advisor agent observes your pods and suggests actions.</div>
                                </div>
                                <div class="pod-actions">
                                    <button type="button" class="open-btn" onclick="launchAdvisor(this)">Launch Advisor</button>
                                </div>
                            </div>
                        `;
                    }
                    html += devaipodPods.map(renderPod).join('');
                    container.innerHTML = html;
                    // Restore collapsed/expanded state across refreshes
                    container.querySelectorAll('.pod-card').forEach(card => {
                        const name = card.dataset.podName;
                        if (collapsedPods.has(name)) {
                            card.classList.add('collapsed');
                        }
                    });
                    const cards = container.querySelectorAll('.pod-card');
                    if (prevPodName) {
                        // Re-render destroyed focus — restore it to the same pod or nearest
                        const restore = Array.from(cards).find(c => c.dataset.podName === prevPodName);
                        (restore || cards[0])?.focus({preventScroll: true});
                    } else if (focusWasInsideContainer && cards.length > 0) {
                        // Focus was on something inside the container (e.g. a button)
                        // that got destroyed by innerHTML — fall back to first card
                        cards[0]?.focus({preventScroll: true});
                    }
                }
                
                document.getElementById('error-container').innerHTML = '';
                checkProposals();
            } catch (err) {
                statusIndicator.classList.add('disconnected');
                statusText.textContent = 'Disconnected';
                document.getElementById('error-container').innerHTML = `
                    <div class="error">${err.message}</div>
                `;
            }
        }
        
        // Launch (or start) the advisor pod
        async function launchAdvisor(btn) {
            btn.disabled = true;
            btn.textContent = 'Launching...';
            
            try {
                const result = await fetch('/api/devaipod/advisor/launch', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                }).then(r => r.json());
                
                if (!result.success) {
                    throw new Error(result.message || 'Launch failed');
                }
                
                // Refresh to show updated status
                await refreshPods({force: true});
            } catch (err) {
                alert(`Advisor launch failed: ${err.message}`);
                btn.disabled = false;
                btn.textContent = 'Launch Advisor';
            }
        }
        
        // Escape HTML to prevent XSS in rendered proposal content
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check for advisor proposals and render them inline in the advisor card
        async function checkProposals() {
            const target = document.getElementById('advisor-proposals');
            if (!target) return; // No advisor pod card rendered

            try {
                const proposals = await apiCall('/devaipod/proposals');
                const pending = proposals.filter(p => p.status === 'pending');

                if (pending.length === 0) {
                    target.innerHTML = '';
                    return;
                }

                target.innerHTML = `
                    <div class="proposals-header">
                        <span>Proposals</span>
                        <span>${pending.length} pending</span>
                    </div>
                    ${pending.map(p => `
                        <div class="proposal-card">
                            <div class="proposal-title">
                                <span class="proposal-priority ${escapeHtml(p.priority)}">${escapeHtml(p.priority)}</span>
                                ${escapeHtml(p.title)}
                            </div>
                            <div class="proposal-meta">${escapeHtml(p.repo)}${p.source ? ' \u2014 ' + escapeHtml(p.source) : ''}</div>
                            <div class="proposal-rationale">${escapeHtml(p.rationale)}</div>
                            <div class="proposal-actions">
                                <button class="open-btn" onclick="launchProposal('${escapeHtml(p.id)}')" style="padding:0.2rem 0.5rem;font-size:0.8rem;">Launch</button>

        // Dismiss a proposal
        async function dismissProposal(id) {
            try {
                await fetch('/api/devaipod/proposals/' + encodeURIComponent(id) + '/dismiss', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                await checkProposals();
            } catch (err) {
                console.error('Failed to dismiss proposal:', err);
            }
        }

        // Launch a proposal as a new pod
        function launchProposal(id) {
            // Find the proposal data from the rendered cards
            const cards = document.querySelectorAll('.proposal-card');
            let repo = '', task = '';
            for (const card of cards) {
                if (card.querySelector(`[onclick*="'${id}'"]`)) {
                    const meta = card.querySelector('.proposal-meta');
                    const rationale = card.querySelector('.proposal-rationale');
                    const title = card.querySelector('.proposal-title');
                    // Extract repo from meta text (first part before ' — ')
                    if (meta) repo = meta.textContent.split(' — ')[0].trim();
                    // Build task from title + rationale
                    if (title) {
                        // Strip the priority badge text
                        const titleText = title.textContent.replace(/^(high|medium|low)\s*/i, '').trim();
                        task = titleText;
                    }
                    if (rationale) task += '\n\n' + rationale.textContent.trim();
                    break;
                }
            }

            // Normalize repo to full URL if needed
            if (repo && !repo.startsWith('http')) {
                repo = 'https://github.com/' + repo;
            }

            // Pre-populate the launch form and open it
            document.getElementById('repo-url').value = repo;
            document.getElementById('task-input').value = task;
            const form = document.getElementById('launch-form');
            const toggle = document.getElementById('launch-toggle');
            if (!form.classList.contains('expanded')) {
                form.classList.add('expanded');
                toggle.style.display = 'none';
            }
            // Scroll to the form
            form.scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.getElementById('repo-url').focus();

            // Dismiss the proposal since the user is acting on it
            dismissProposal(id);
        }

        // Toggle launch form visibility
        function toggleLaunchForm() {

            const toggle = document.getElementById('launch-toggle');
            const isExpanded = form.classList.contains('expanded');
            
            if (isExpanded) {

                document.getElementById('task-input').value = '';

        function addScopeRow(value) {

        // Submit launch form
        async function submitLaunchForm(event) {
            event.preventDefault();
            
            const repoUrl = document.getElementById('repo-url').value.trim();
            const task = document.getElementById('task-input').value.trim();
            const submitBtn = document.getElementById('launch-submit-btn');
            const errorDiv = document.getElementById('launch-error');
            
            if (!repoUrl) {
                errorDiv.textContent = 'Repository URL is required';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Launching...';
            errorDiv.style.display = 'none';
            
            try {
                const body = { source: repoUrl };
                if (task) body.task = task;
                const podName = document.getElementById('pod-name').value.trim();
                if (podName) body.name = podName;
                const image = document.getElementById('image-override').value.trim();
                if (image) body.image = image;
                const scopes = Array.from(document.querySelectorAll('.scope-input'))
                    .map(el => el.value.trim()).filter(Boolean);
                if (scopes.length > 0) body.service_gator_scopes = scopes;
                const gatorImage = document.getElementById('gator-image').value.trim();
                if (gatorImage) body.service_gator_image = gatorImage;
                if (document.getElementById('gator-ro').checked) body.service_gator_ro = true;
                
                const response = await fetch('/api/devaipod/run', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                const result = await response.json();
                console.log('Launch response:', result);
                
                if (!response.ok || !result.success) {
                    throw new Error(result.message || `HTTP ${response.status}`);
                }
                
                // Success - refresh pods and collapse form
                console.log('Workspace created:', result.workspace);
                await refreshPods({force: true});
                toggleLaunchForm();
            } catch (err) {
                console.error('Launch failed:', err);
                errorDiv.textContent = `Failed to launch: ${err.message}`;
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Launch';
            }
        }
        
        // Handle keyboard navigation
        document.addEventListener('keydown', (e) => {
            const activeElement = document.activeElement;
            const tagName = activeElement.tagName.toLowerCase();
            const isInputFocused = tagName === 'input' || tagName === 'textarea' || activeElement.isContentEditable;
            
            // 'n' key opens the new workspace form (when not in an input)
            if (e.key === 'n' && !isInputFocused) {
                const form = document.getElementById('launch-form');
                if (!form.classList.contains('expanded')) {
                    e.preventDefault();
                    toggleLaunchForm();
                }
            }
            
            // Escape key closes terminal overlay first
            if (e.key === 'Escape') {
                const termOverlay = document.getElementById('terminal-overlay');
                if (termOverlay.classList.contains('active')) {
                    e.preventDefault();
                    closeTerminal();
                    return;
                }
            }

            // Escape key closes the launch form
            if (e.key === 'Escape') {
                const form = document.getElementById('launch-form');
                if (form.classList.contains('expanded')) {
                    e.preventDefault();
                    toggleLaunchForm();
                }
            }
            
            // Enter key on a pod card: open agent if running, start if stopped
            if (e.key === 'Enter' && activeElement.classList.contains('pod-card')) {
                e.preventDefault();
                const podName = activeElement.dataset.podName;
                if (podName && activeElement.dataset.running === 'true') {
                    openAgent(podName);
                } else {
                    const startBtn = activeElement.querySelector('[data-action="start"]');
                    if (startBtn) startBtn.click();
                }
            }

            // Arrow keys navigate between pod cards
            if ((e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !isInputFocused) {
                const cards = Array.from(document.querySelectorAll('.pod-card'));
                if (cards.length === 0) return;
                const idx = cards.indexOf(activeElement);
                let next;
                if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                    next = idx < 0 ? 0 : Math.min(idx + 1, cards.length - 1);
                } else {
                    next = idx < 0 ? cards.length - 1 : Math.max(idx - 1, 0);
                }
                e.preventDefault();
                cards[next].focus();
            }
        });
        
        // Terminal state
        let activeTerminal = null;  // { term, ws, sessionId, podName, fitAddon }

        async function openTerminal(podName) {
            // Create a PTY session
            try {
                const response = await fetch(`/api/devaipod/pods/${encodeURIComponent(podName)}/pty`, {
                    method: 'POST',
                    headers: {
                        ...authHeader,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text || `HTTP ${response.status}`);
                }
                const ptyInfo = await response.json();
                connectTerminal(podName, ptyInfo);
            } catch (err) {
                alert(`Failed to open terminal: ${err.message}`);
            }
        }

        function connectTerminal(podName, ptyInfo) {
            // Close any existing terminal
            if (activeTerminal) {
                cleanupTerminal();
            }

            // Create xterm.js instance
            const term = new Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: "'IBM Plex Mono', 'Cascadia Code', Menlo, Monaco, monospace",
                theme: {
                    background: '#131010',
                    foreground: '#f1ecec',
                    cursor: '#89b5ff',
                    selectionBackground: 'rgba(137, 181, 255, 0.3)',
                    black: '#131010',
                    red: '#ef442a',
                    green: '#00bd00',
                    yellow: '#ffdc17',
                    blue: '#89b5ff',
                    magenta: '#c678dd',
                    cyan: '#56b6c2',
                    white: '#f1ecec',
                }
            });

            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            const container = document.getElementById('terminal-container');
            container.innerHTML = '';
            term.open(container);

            // Show overlay
            document.getElementById('terminal-overlay').classList.add('active');
            document.getElementById('terminal-title').textContent = `Terminal — ${podName} workspace`;

            // Fit terminal to container
            setTimeout(() => fitAddon.fit(), 50);

            // Connect WebSocket
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/api/devaipod/pods/${encodeURIComponent(podName)}/pty/${encodeURIComponent(ptyInfo.id)}/connect?token=${encodeURIComponent(token)}&cursor=0`;
            const ws = new WebSocket(wsUrl);

            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                // Send initial resize
                const dims = fitAddon.proposeDimensions();
                if (dims) {
                    fetch(`/api/devaipod/pods/${encodeURIComponent(podName)}/pty/${encodeURIComponent(ptyInfo.id)}`, {
                        method: 'PUT',
                        headers: {
                            ...authHeader,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ size: { rows: dims.rows, cols: dims.cols } })
                    }).catch(() => {});
                }
            };

            ws.onmessage = (event) => {
                if (event.data instanceof ArrayBuffer) {
                    const bytes = new Uint8Array(event.data);
                    // Check for meta frame (starts with 0x00)
                    if (bytes.length > 0 && bytes[0] === 0x00) {
                        // Meta frame — contains cursor info, ignore for now
                        return;
                    }
                    // Binary terminal data
                    term.write(bytes);
                } else {
                    // Text terminal data
                    term.write(event.data);
                }
            };

            ws.onclose = () => {
                term.write('\r\n\x1b[90m[Connection closed]\x1b[0m\r\n');
            };

            ws.onerror = () => {
                term.write('\r\n\x1b[31m[Connection error]\x1b[0m\r\n');
            };

            // Forward terminal input to WebSocket
            term.onData((data) => {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(data);
                }
            });

            // Handle window resize
            const resizeHandler = () => {
                fitAddon.fit();
                const dims = fitAddon.proposeDimensions();
                if (dims && ws.readyState === WebSocket.OPEN) {
                    fetch(`/api/devaipod/pods/${encodeURIComponent(podName)}/pty/${encodeURIComponent(ptyInfo.id)}`, {
                        method: 'PUT',
                        headers: {
                            ...authHeader,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ size: { rows: dims.rows, cols: dims.cols } })
                    }).catch(() => {});
                }
            };
            window.addEventListener('resize', resizeHandler);

            activeTerminal = {
                term, ws, sessionId: ptyInfo.id, podName, fitAddon,
                resizeHandler
            };
        }

        function cleanupTerminal() {
            if (!activeTerminal) return;
            const { term, ws, sessionId, podName, resizeHandler } = activeTerminal;

            window.removeEventListener('resize', resizeHandler);

            if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
                ws.close();
            }

            term.dispose();

            // Delete the PTY session
            fetch(`/api/devaipod/pods/${encodeURIComponent(podName)}/pty/${encodeURIComponent(sessionId)}`, {
                method: 'DELETE',
                headers: authHeader
            }).catch(() => {});

            activeTerminal = null;
        }

        function closeTerminal() {
            cleanupTerminal();
            document.getElementById('terminal-overlay').classList.remove('active');
            document.getElementById('terminal-container').innerHTML = '';
        }

        // Initial load
        if (token) {
            refreshPods();
            // Auto-refresh every 5 seconds
            setInterval(refreshPods, 5000);
        }
    </script>
</body>
</html>
