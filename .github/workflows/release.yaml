name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build the host-side CLI shim for all supported platforms.
  # The server binary ships inside the container image (see build-container.yml);
  # the host shim is what users install on their PATH.
  build-host-shim:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build host shim
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release -p devaipod-host --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/devaipod dist/
          cd dist
          tar -czf devaipod-host-${{ matrix.target }}.tar.gz devaipod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devaipod-host-${{ matrix.target }}
          path: dist/devaipod-host-${{ matrix.target }}.tar.gz

  release:
    needs: build-host-shim
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/devaipod-host-x86_64-unknown-linux-gnu/devaipod-host-x86_64-unknown-linux-gnu.tar.gz
            artifacts/devaipod-host-aarch64-unknown-linux-gnu/devaipod-host-aarch64-unknown-linux-gnu.tar.gz
            artifacts/devaipod-host-x86_64-apple-darwin/devaipod-host-x86_64-apple-darwin.tar.gz
            artifacts/devaipod-host-aarch64-apple-darwin/devaipod-host-aarch64-apple-darwin.tar.gz
          generate_release_notes: true

  # Publish devcontainer feature after release
  publish-feature:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: "Publish Features"
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./features/src"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
