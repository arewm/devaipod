name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  # Integration tests: run directly on the host with podman.
  # Uses test-integration-local which skips web UI tests (no container image needed).
  integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup host (newer podman, just)
        uses: bootc-dev/actions/bootc-ubuntu-setup@main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Pull test image
        run: podman pull ghcr.io/bootc-dev/devenv-debian:latest

      - name: Run integration tests
        run: just test-integration-local

  # Security audit of dependencies
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # Test the devcontainer feature install script syntax
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check install.sh
        run: shellcheck features/src/devaipod/install.sh
